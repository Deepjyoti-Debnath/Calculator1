<body>
    <div class="container1">
        <h1>Sign In <br></h1>
        <div class="display1">
            <input type="text" id="username" placeholder="Username">
        </div>
        <div class="display1">
            <input type="text" id="email" placeholder="Email" target="_blank">
        </div>
        <div class="display1">
            <input type="text" id="password" placeholder="Password">
        </div>
        <div id="rem">
            <input type="checkbox" id="remember">
            <a href=""><label for="remember"> Remember me</label></a>
        </div>
        <button type="button" id="signin-btn">Sign In</button>
        <a href="pass.html"><button type="button" id="forget-btn"><i class="fa-solid fa-question-circle"></i> Forget Password</button></a>
    </div>
